<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050608" />
  <link rel="icon" href="data:," />
  <title>STONE TO SIGNAL</title>
  <style>
    /* Critical pre-JS styles: page must look intentional before the bundle loads */
    html { background: #050608; scrollbar-gutter: stable; }
    body { margin: 0; background: #050608; }
    body.loading { overflow: hidden; }
    #loader {
      position: fixed; inset: 0; z-index: 30;
      background: #050608;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      transition: opacity 0.6s ease;
    }
    #loader.done { opacity: 0; pointer-events: none; }
    #loader-track { width: 160px; height: 1px; background: rgba(255,255,255,0.12); }
    #loader-bar {
      width: 100%; height: 100%; background: rgba(255,255,255,0.85);
      transform: scaleX(0); transform-origin: left center;
    }
    #loader-text {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body class="loading">
  <canvas id="gl"></canvas>

  <div id="overlay" aria-hidden="true">
    <div class="label" id="label-1"><p class="label-title">CARVED 1504</p><p class="label-caption">MICHELANGELO — DAVID</p></div>
    <div class="label" id="label-2"><p class="label-title">299,952 VERTICES</p><p class="label-caption">DISSOLUTION</p></div>
    <div class="label" id="label-3"><p class="label-title">DRAWN INTO WIRE</p><p class="label-caption">REFORMATION</p></div>
    <div class="label label-end" id="label-4"><p class="label-title">RECAST 2026</p><p class="label-caption">EDITION 001 — EYEWEAR</p></div>
    <div id="progress"><div id="progress-fill"></div><div class="tick" style="top:10%"></div><div class="tick" style="top:26%"></div><div class="tick" style="top:56%"></div><div class="tick" style="top:74%"></div><div class="tick" style="top:88%"></div></div>
  </div>

  <div id="scroll-track"></div>

  <div id="loader">
    <div id="loader-track"><div id="loader-bar"></div></div>
    <div id="loader-text">LOADING</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
